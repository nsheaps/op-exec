[tools]
node = "lts"
yarn = "4"
shellcheck = "latest"
shfmt = "latest"

[tasks.lint]
description = "Run ShellCheck on all bash scripts"
run = "shellcheck bin/op-exec"

[tasks.test]
description = "Run CLI tests"
run = """
echo "Testing op-exec --help..."
bash bin/op-exec --help > /dev/null
echo "All tests passed."
"""

[tasks.fmt]
description = "Format all bash scripts with shfmt"
run = "shfmt -w bin/op-exec"

[tasks.fmt-check]
description = "Check formatting of all bash scripts"
run = "shfmt -d bin/op-exec"

[tasks.check]
description = "Run all checks (lint + fmt-check + test)"
depends = ["lint", "fmt-check", "test"]
run = "echo 'All checks passed'"
